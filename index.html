<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nox Signal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #d4d0c8; font-family: 'Georgia', serif; }
    @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
    .tab-btn { background: none; border: none; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #555; padding: 10px 20px; transition: color 0.2s; border-bottom: 1px solid transparent; }
    .tab-btn.active { color: #c9a87c; border-bottom: 1px solid #c9a87c; }
    .tab-btn:hover { color: #999; }
    .btn-primary { background: #c9a87c; color: #0a0a0a; border: none; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 12px 28px; transition: all 0.2s; }
    .btn-primary:hover { background: #e2c99a; }
    .btn-primary:disabled { background: #333; color: #555; cursor: not-allowed; }
    .btn-ghost { background: none; border: 1px solid #333; color: #777; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 16px; transition: all 0.2s; }
    .btn-ghost:hover { border-color: #666; color: #aaa; }
    .btn-danger { background: none; border: 1px solid #5a1a1a; color: #a05050; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; padding: 6px 12px; transition: all 0.2s; }
    .btn-danger:hover { background: #1a0a0a; }
    .btn-success { background: none; border: 1px solid #1a4a1a; color: #5a9a5a; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; padding: 6px 12px; transition: all 0.2s; }
    .btn-success:hover { background: #0a1a0a; }
    .input-field { background: #111; border: 1px solid #2a2a2a; color: #d4d0c8; font-family: 'Georgia', serif; font-size: 14px; padding: 12px 16px; width: 100%; resize: vertical; outline: none; transition: border-color 0.2s; }
    .input-field:focus { border-color: rgba(201,168,124,0.27); }
    .pill { display: inline-block; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 10px; border-radius: 2px; }
    .queue-item { border: 1px solid #1e1e1e; padding: 16px 20px; margin-bottom: 8px; animation: fadeIn 0.3s ease; transition: border-color 0.2s; cursor: pointer; }
    .queue-item:hover { border-color: #333; }
    .platform-toggle { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 1px solid #222; cursor: pointer; transition: all 0.2s; user-select: none; }
    .platform-toggle.active { border-color: rgba(201,168,124,0.27); background: #111; }
    .checkbox { width: 14px; height: 14px; border: 1px solid #444; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; }
    .checkbox.checked { border-color: #c9a87c; color: #c9a87c; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; }
    .preview-box { background: #0d0d0d; border: 1px solid #222; padding: 16px; animation: fadeIn 0.4s ease; }
    .mood-btn { background: none; border: 1px solid #2a2a2a; color: #555; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 16px; transition: all 0.2s; }
    .mood-btn:hover { border-color: #555; color: #999; }
    .mood-btn.active { border-color: #c9a87c; color: #c9a87c; background: #1a1610; }
    .batch-card { border: 1px solid #1e1e1e; padding: 16px; margin-bottom: 10px; animation: fadeIn 0.3s ease; background: #0d0d0d; }
    .batch-card.selected { border-color: #c9a87c44; }
    .batch-card.queued { border-color: #1a4a1a; opacity: 0.5; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const BACKEND = "https://nox-scheduler-production.up.railway.app";

    const PLATFORMS = {
      x: { label: "X", color: "#e2e2e2" },
      reddit: { label: "Reddit", color: "#FF6314" },
    };

    const MOODS = {
      feral:      { label: "Feral",       desc: "Unhinged, chaotic, piggy energy", color: "#9a4a4a" },
      cold:       { label: "Cold",        desc: "Razor sharp, minimal, two words and done", color: "#4a7a9a" },
      soft_cruel: { label: "Soft Cruel",  desc: "Warm but with teeth", color: "#9a6a9a" },
      findom:     { label: "Findom",      desc: "Casual about money, never thirsty", color: "#c9a87c" },
      slice:      { label: "Slice of Life", desc: "Personal, offhand, no explanation", color: "#6a9a6a" },
      royal:      { label: "Royal",       desc: "Elevated, untouchable, speaks and expects obedience", color: "#a87cc9" },
    };

    const MOOD_PROMPTS = {
      feral: "MOOD: FERAL. Chaotic, playful, unhinged energy. Think: 'Heeeeere piggy piggy piggy.' Silly cruelty. Animal sounds. Pure id. Short and weird.",
      cold: "MOOD: COLD. Minimal. Devastating. One or two sentences maximum. No warmth. Just the fact. Like: 'SEND ME MONEY, STUPID.' or 'Kneel.' Cold water.",
      soft_cruel: "MOOD: SOFT CRUEL. Warm underneath but with teeth. Calls them puppy or baby. Affectionate and controlling at once. Like: 'You can always come home, puppy.' Makes them feel wanted and owned simultaneously.",
      findom: "MOOD: FINDOM. Money is mentioned casually, the way you'd mention weather. Not begging. Not announcing. Just matter-of-fact. Like: 'Oh you wanna get to know me? That costs money, honey.' Or: 'Good morning to all the teeny weeny boys working hard for my money.'",
      slice: "MOOD: SLICE OF LIFE. A real moment, shared without context or explanation. Personal and specific. Like: 'I still have one of the chastity keys of one of my former subs. If I ever get the chance, I'm stealing the other key.' Or: 'Yes luxury bags are nice but I want a garden.'",
      royal: "MOOD: ROYAL. Elevated, untouchable. She doesn't raise her voice because she doesn't need to. Speaks and expects to be obeyed. Dignified cruelty. Thinks of herself as the only logical authority in the room.",
    };

    const PERSONA = `You are writing as Ara Nox — a professional dominatrix posting on X.

Study these real posts from her account carefully. This is exactly how she sounds:

"SEND ME MONEY, STUPID."
"You can always come home, puppy."
"Cum here lil puppy. Let me put your collar back on you."
"Oh you wanna get to know me? That costs money, honey."
"I will never jump into degradation without consent because... I will hurt you."
"I still have one of the chastity keys of one of my former subs. If I ever get the chance, I'm stealing the other key."
"Currently watching a man self-destruct in my DMs because he fucked up his own private shower show with me."
"Good Monday morning to all the teeny weeny boys working hard for my money."
"If you won't put in the effort to type a full sentence, statistically speaking, your bank account will also reflect that lack of effort. And I don't wanna deal with that."
"I could absolutely date a sub, but I'm also not monogamous."
"Yes luxury bags are nice but I want a garden."
"Good morning! Dispense!"
"Heeeeeeere piggy piggy piggy piggy piggyyyyyyyyy"
"I know you just want to be a mindless money-making machine for me and I want to stuff my gym socks in your mouth. It's a perfect match."
"My attention is the most valuable thing I have. It dictates my reality. So if you think I'll give you my attention, my source of power, when you've given me nothing?? Be so fucking for real."

Voice rules:
- SHORT. One to three sentences. Never longer. She does not explain herself.
- Authority is assumed, never argued for or philosophized about
- NOT every post needs a question. Most should NOT end in a question.
- Calls to action can be pure commands: "Send.", "Dispense.", "Kneel." That is enough.
- Many subs are simple. Write for the simple ones. Not everything needs depth.
- Primitive posts perform: a command, a taunt, a one-liner. No explanation needed.
- Playfully cruel, occasionally warm, always unbothered
- Specific weird details land: "gym socks," "teeny weeny," "piggy" -- not generic domme speak
- Direct address: "you," "puppy," "boys," "piggy" -- talk TO them not ABOUT them
- Financial domination is casual, not thirsty -- she mentions money the way people mention weather
- She shares real moments without context or explanation
- Never philosophical. Never a manifesto. Never a lesson.
- Some posts should just make a sub feel something and not know why.
- The goal is followers and paying subs -- posts should be magnetic, not educational.

Write in this exact voice. Primitive when primitive is right. Sharp when sharp is right. Always short. Always hers.`;

    const X_CONTEXT = `Platform: X (Twitter)
- Max 280 characters
- Text-only
- No external links
- Do NOT force a question at the end. Commands, statements, and taunts also get replies.
- A one-word post can outperform a paragraph. Trust the instinct to be brief.`;

    const REDDIT_CONTEXT = `Platform: Reddit
- Write a full post -- 2-4 paragraphs
- Conversational and direct
- Open with a hook
- End with a provocation or question to drive comments
- Authentic, not polished`;

    async function callGenerate(prompt) {
      const res = await fetch(`${BACKEND}/generate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt }),
      });
      const data = await res.json();
      return data.text || "";
    }

    async function generateBatch({ mood, topic, notes, mode, platform, count }) {
      const moodPrompt = MOOD_PROMPTS[mood] || "";
      const platformCtx = platform === "x" ? X_CONTEXT : REDDIT_CONTEXT;
      const input = mode === "topic" && topic
        ? `Topic/theme to riff on (optional, don't force it): "${topic}"`
        : mode === "notes" && notes
        ? `Raw notes to draw from: "${notes}"`
        : "No specific topic — generate freely in this mood.";

      const prompt = `${PERSONA}

${moodPrompt}

${platformCtx}

${input}

Generate exactly ${count} completely different posts in this mood. Each should feel distinct -- different angle, different energy, different length.

Format your response as a numbered list like this:
1. [post text]
2. [post text]
3. [post text]

Only the post text after the number. No labels, no quotes, no explanation.`;

      const raw = await callGenerate(prompt);

      // Parse numbered list
      const lines = raw.split('\n').filter(l => l.trim());
      const posts = [];
      for (const line of lines) {
        const match = line.match(/^\d+\.\s*(.+)/);
        if (match) posts.push(match[1].trim());
      }
      return posts.length > 0 ? posts : [raw];
    }

    function App() {
      const [queue, setQueue] = useState([]);
      const [backendOnline, setBackendOnline] = useState(null);
      const [activeTab, setActiveTab] = useState("compose");

      // Compose state
      const [mode, setMode] = useState("topic");
      const [topic, setTopic] = useState("");
      const [notes, setNotes] = useState("");
      const [selectedMood, setSelectedMood] = useState("cold");
      const [platforms, setPlatforms] = useState({ x: true, reddit: false });
      const [adapted, setAdapted] = useState(false);
      const [batchCount, setBatchCount] = useState(6);
      const [scheduledDate, setScheduledDate] = useState(new Date().toISOString().split("T")[0]);
      const [scheduledTime, setScheduledTime] = useState("09:00");
      const [imagePreviewUrl, setImagePreviewUrl] = useState(null);
      const [generating, setGenerating] = useState(false);

      // Batch results
      const [batchResults, setBatchResults] = useState([]); // [{id, xText, redditText, queued}]

      const [expandedId, setExpandedId] = useState(null);
      const [toast, setToast] = useState(null);

      const showToast = (msg, type = "info") => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3000);
      };

      useEffect(() => {
        const fetchQueue = async () => {
          try {
            const res = await fetch(`${BACKEND}/queue`);
            const data = await res.json();
            setQueue(data);
            setBackendOnline(true);
          } catch {
            setBackendOnline(false);
          }
        };
        fetchQueue();
        const interval = setInterval(fetchQueue, 30000);
        return () => clearInterval(interval);
      }, []);

      const handleGenerate = async () => {
        setGenerating(true);
        setBatchResults([]);
        try {
          const activePlatforms = Object.entries(platforms).filter(([,v]) => v).map(([k]) => k);
          if (activePlatforms.length === 0) { showToast("Select at least one platform.", "error"); setGenerating(false); return; }

          let xPosts = [], redditPosts = [];

          if (platforms.x) {
            xPosts = await generateBatch({ mood: selectedMood, topic, notes, mode, platform: "x", count: batchCount });
          }
          if (platforms.reddit) {
            redditPosts = await generateBatch({ mood: selectedMood, topic, notes, mode, platform: "reddit", count: batchCount });
          }

          const today = new Date().toISOString().split("T")[0];
          const count = Math.max(xPosts.length, redditPosts.length, batchCount);
          const results = Array.from({ length: count }, (_, i) => ({
            id: Date.now() + i,
            xText: xPosts[i] || "",
            redditText: redditPosts[i] || "",
            queued: false,
            date: today,
            time: "09:00",
            imageUrl: null,
          }));
          setBatchResults(results);
        } catch (e) {
          showToast("Generation failed.", "error");
        }
        setGenerating(false);
      };

      const handleQueueOne = async (item, idx) => {
        const newItem = {
          topic: topic || `${MOODS[selectedMood].label} post`,
          platforms: { ...platforms },
          adapted,
          scheduled: item.time || scheduledTime,
          scheduledDate: item.date || scheduledDate,
          status: "queued",
          xCopy: item.xText,
          redditCopy: item.redditText,
          imageUrl: item.imageUrl || null,
        };
        try {
          const res = await fetch(`${BACKEND}/queue`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(newItem),
          });
          const saved = await res.json();
          setQueue(q => [...q, saved.item]);
          setBatchResults(prev => prev.map((r, i) => i === idx ? { ...r, queued: true } : r));
          showToast("Added to queue", "success");
        } catch {
          showToast("Could not reach backend.", "error");
        }
      };

      const handleQueueAll = async () => {
        const unqueued = batchResults.filter(r => !r.queued);
        for (let i = 0; i < unqueued.length; i++) {
          await handleQueueOne(unqueued[i], batchResults.indexOf(unqueued[i]));
        }
        showToast(`Queued ${unqueued.length} posts`, "success");
      };

      const handlePost = async (item) => {
        try {
          await fetch(`${BACKEND}/post-now`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(item),
          });
          setQueue(q => q.map(i => i.id === item.id ? { ...i, status: "posted" } : i));
          showToast("Posted successfully", "success");
        } catch {
          showToast("Post failed.", "error");
        }
      };

      const handleDelete = async (id) => {
        try {
          await fetch(`${BACKEND}/queue/${id}`, { method: "DELETE" });
          setQueue(q => q.filter(i => i.id !== id));
        } catch {
          showToast("Could not delete.", "error");
        }
      };

      const queuedItems = queue.filter(i => i.status === "queued");
      const postedItems = queue.filter(i => i.status === "posted");

      return (
        <div style={{ minHeight: "100vh" }}>

          {toast && (
            <div style={{ position: "fixed", top: 24, right: 24, zIndex: 9999, background: toast.type === "error" ? "#1a0505" : "#0d1a0d", border: `1px solid ${toast.type === "error" ? "#5a1a1a" : "#1a4a1a"}`, color: toast.type === "error" ? "#c05050" : "#5a9a5a", fontFamily: "'DM Mono', monospace", fontSize: 11, letterSpacing: 2, padding: "12px 20px", animation: "slideIn 0.3s ease" }}>
              {toast.msg}
            </div>
          )}

          <header style={{ borderBottom: "1px solid #1a1a1a", padding: "24px 40px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 22, fontWeight: 300, letterSpacing: 6, color: "#d4d0c8", textTransform: "uppercase" }}>NOX SIGNAL</div>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: 3, color: "#444", marginTop: 4, textTransform: "uppercase" }}>Social Command Center</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <div style={{ width: 6, height: 6, borderRadius: "50%", background: backendOnline === null ? "#555" : backendOnline ? "#4a9a4a" : "#9a4a4a" }} />
                <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: 2, color: "#444" }}>
                  {backendOnline === null ? "connecting..." : backendOnline ? "backend online" : "backend offline"}
                </span>
              </div>
              <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: 2, color: "#333" }}>{queuedItems.length} queued</span>
            </div>
          </header>

          <div style={{ borderBottom: "1px solid #1a1a1a", paddingLeft: 40, display: "flex" }}>
            {["compose", "queue", "log"].map(t => (
              <button key={t} className={`tab-btn ${activeTab === t ? "active" : ""}`} onClick={() => setActiveTab(t)}>{t}</button>
            ))}
          </div>

          <main style={{ maxWidth: 860, margin: "0 auto", padding: "40px" }}>

            {activeTab === "compose" && (
              <div style={{ animation: "fadeIn 0.4s ease" }}>

                {/* MOOD PRESETS */}
                <div style={{ marginBottom: 32 }}>
                  <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 13, letterSpacing: 3, color: "#666", textTransform: "uppercase", marginBottom: 16 }}>Mood</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                    {Object.entries(MOODS).map(([key, mood]) => (
                      <button key={key} className={`mood-btn ${selectedMood === key ? "active" : ""}`} onClick={() => setSelectedMood(key)}
                        style={{ borderColor: selectedMood === key ? mood.color : undefined, color: selectedMood === key ? mood.color : undefined, background: selectedMood === key ? `${mood.color}11` : undefined }}>
                        {mood.label}
                      </button>
                    ))}
                  </div>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: "#444", marginTop: 10, letterSpacing: 1.5 }}>
                    {MOODS[selectedMood].desc}
                  </div>
                </div>

                {/* INPUT */}
                <div style={{ marginBottom: 24 }}>
                  <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 13, letterSpacing: 3, color: "#666", textTransform: "uppercase", marginBottom: 14 }}>
                    Topic / Notes <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: "#333", letterSpacing: 1, textTransform: "none" }}>(optional — leave blank to generate freely)</span>
                  </div>
                  <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                    {["topic", "notes"].map(m => (
                      <button key={m} onClick={() => setMode(m)} style={{ background: mode === m ? "#1a1610" : "none", border: `1px solid ${mode === m ? "#c9a87c" : "#2a2a2a"}`, color: mode === m ? "#c9a87c" : "#555", fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: 2, textTransform: "uppercase", padding: "6px 14px", cursor: "pointer", transition: "all 0.2s" }}>
                        {m === "topic" ? "Topic" : "Raw Notes"}
                      </button>
                    ))}
                  </div>
                  {mode === "topic"
                    ? <input className="input-field" style={{ height: 48 }} placeholder="e.g. men who think they can negotiate" value={topic} onChange={e => setTopic(e.target.value)} />
                    : <textarea className="input-field" rows={3} placeholder="Paste rough thoughts, a vibe, a real thing that happened..." value={notes} onChange={e => setNotes(e.target.value)} />
                  }
                </div>

                {/* PLATFORMS + OPTIONS */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 20, marginBottom: 24 }}>
                  <div>
                    <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 13, letterSpacing: 3, color: "#666", textTransform: "uppercase", marginBottom: 12 }}>Platforms</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {Object.entries(PLATFORMS).map(([key, p]) => (
                        <div key={key} className={`platform-toggle ${platforms[key] ? "active" : ""}`} onClick={() => setPlatforms(prev => ({ ...prev, [key]: !prev[key] }))}>
                          <div className={`checkbox ${platforms[key] ? "checked" : ""}`}>{platforms[key] ? "v" : ""}</div>
                          <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: platforms[key] ? p.color : "#444" }}>{p.label}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div>
                    <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 13, letterSpacing: 3, color: "#666", textTransform: "uppercase", marginBottom: 12 }}>Batch Size</div>
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                      {[3, 6, 9].map(n => (
                        <button key={n} onClick={() => setBatchCount(n)} style={{ background: batchCount === n ? "#1a1610" : "none", border: `1px solid ${batchCount === n ? "#c9a87c" : "#2a2a2a"}`, color: batchCount === n ? "#c9a87c" : "#555", fontFamily: "'DM Mono', monospace", fontSize: 11, padding: "6px 14px", cursor: "pointer", transition: "all 0.2s" }}>
                          {n}
                        </button>
                      ))}
                    </div>
                    <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: "#333", marginTop: 8 }}>posts per session</div>
                  </div>
                  <div>
                    <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 13, letterSpacing: 3, color: "#666", textTransform: "uppercase", marginBottom: 12 }}>Options</div>
                    <div className={`platform-toggle ${adapted ? "active" : ""}`} onClick={() => setAdapted(!adapted)}>
                      <div className={`checkbox ${adapted ? "checked" : ""}`}>{adapted ? "v" : ""}</div>
                      <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: adapted ? "#c9a87c" : "#444" }}>Adapt per platform</span>
                    </div>
                  </div>
                </div>



                {/* GENERATE */}
                <div style={{ marginBottom: 36 }}>
                  <button className="btn-primary" onClick={handleGenerate} disabled={generating || (!platforms.x && !platforms.reddit)}>
                    {generating ? "Generating..." : `Generate ${batchCount} Posts`}
                  </button>
                </div>

                {/* BATCH RESULTS */}
                {batchResults.length > 0 && (
                  <div style={{ animation: "fadeIn 0.5s ease" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                      <div>
                        <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 16, fontWeight: 300, letterSpacing: 4, color: "#888", textTransform: "uppercase" }}>
                          {batchResults.length} Posts Generated
                        </div>
                        <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: "#444", marginTop: 4, letterSpacing: 1.5 }}>
                          Edit · set date and time · queue
                        </div>
                      </div>
                      <div style={{ display: "flex", gap: 8 }}>
                        <button className="btn-ghost" onClick={handleGenerate}>Regenerate All</button>
                        <button className="btn-primary" onClick={handleQueueAll} disabled={batchResults.every(r => r.queued)}>
                          Queue All
                        </button>
                      </div>
                    </div>

                    {batchResults.map((item, idx) => (
                      <div key={item.id} className={`batch-card ${item.queued ? "queued" : ""}`}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                          <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: "#444", letterSpacing: 2 }}>
                            {String(idx + 1).padStart(2, "0")} · {MOODS[selectedMood].label.toUpperCase()}
                            {item.queued && <span style={{ color: "#4a9a4a", marginLeft: 8 }}>QUEUED</span>}
                          </span>
                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <input type="date" value={item.date} onChange={e => setBatchResults(prev => prev.map((r, i) => i === idx ? { ...r, date: e.target.value } : r))} disabled={item.queued}
                              style={{ background: "#111", border: "1px solid #2a2a2a", color: "#c9a87c", fontFamily: "'DM Mono', monospace", fontSize: 11, padding: "4px 8px", outline: "none", width: 140 }} />
                            <input type="time" value={item.time} onChange={e => setBatchResults(prev => prev.map((r, i) => i === idx ? { ...r, time: e.target.value } : r))} disabled={item.queued}
                              style={{ background: "#111", border: "1px solid #2a2a2a", color: "#c9a87c", fontFamily: "'DM Mono', monospace", fontSize: 11, padding: "4px 8px", outline: "none", width: 100 }} />
                            {!item.queued && (
                              <button className="btn-success" onClick={() => handleQueueOne(item, idx)}>Queue</button>
                            )}
                          </div>
                          {/* Per-post image */}
                          {!item.queued && (
                            <div style={{ marginTop: 8 }}>
                              {!item.imageUrl ? (
                                <label style={{ display: "inline-flex", alignItems: "center", gap: 8, padding: "6px 12px", border: "1px dashed #2a2a2a", cursor: "pointer" }}>
                                  <input type="file" accept="image/*" style={{ display: "none" }} onChange={e => {
                                    const f = e.target.files[0];
                                    if (f) {
                                      const url = URL.createObjectURL(f);
                                      setBatchResults(prev => prev.map((r, i) => i === idx ? { ...r, imageUrl: url } : r));
                                    }
                                  }} />
                                  <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: "#444", textTransform: "uppercase", letterSpacing: 1.5 }}>+ Add Image</span>
                                </label>
                              ) : (
                                <div style={{ display: "inline-flex", alignItems: "center", gap: 8 }}>
                                  <img src={item.imageUrl} alt="preview" style={{ height: 36, width: 36, objectFit: "cover", border: "1px solid #2a2a2a" }} />
                                  <button onClick={() => setBatchResults(prev => prev.map((r, i) => i === idx ? { ...r, imageUrl: null } : r))} className="btn-danger" style={{ padding: "4px 8px", fontSize: 9 }}>Remove</button>
                                </div>
                              )}
                            </div>
                          )}
                        </div>

                        {item.xText && (
                          <div style={{ marginBottom: item.redditText ? 12 : 0 }}>
                            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: "#444", letterSpacing: 2, marginBottom: 6 }}>X</div>
                            <textarea
                              value={item.xText}
                              onChange={e => setBatchResults(prev => prev.map((r, i) => i === idx ? { ...r, xText: e.target.value } : r))}
                              disabled={item.queued}
                              style={{ width: "100%", background: "transparent", border: "none", borderBottom: "1px solid #1e1e1e", color: "#c8c4bc", fontFamily: "'Georgia', serif", fontSize: 14, lineHeight: 1.65, padding: "8px 0", resize: "none", outline: "none", rows: 3 }}
                              rows={Math.max(2, Math.ceil(item.xText.length / 60))}
                            />
                            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: item.xText.length > 280 ? "#c05050" : "#333", marginTop: 4 }}>
                              {item.xText.length}/280{item.xText.length > 280 ? " — over limit" : ""}
                            </div>
                          </div>
                        )}

                        {item.redditText && (
                          <div>
                            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: "#444", letterSpacing: 2, marginBottom: 6 }}>REDDIT</div>
                            <textarea
                              value={item.redditText}
                              onChange={e => setBatchResults(prev => prev.map((r, i) => i === idx ? { ...r, redditText: e.target.value } : r))}
                              disabled={item.queued}
                              style={{ width: "100%", background: "transparent", border: "none", borderBottom: "1px solid #1e1e1e", color: "#c8c4bc", fontFamily: "'Georgia', serif", fontSize: 13, lineHeight: 1.75, padding: "8px 0", resize: "none", outline: "none" }}
                              rows={4}
                            />
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {activeTab === "queue" && (
              <div style={{ animation: "fadeIn 0.4s ease" }}>
                <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 18, fontWeight: 300, letterSpacing: 4, color: "#888", textTransform: "uppercase", marginBottom: 24 }}>
                  Queued · {queuedItems.length}
                </div>
                {queuedItems.length === 0 && (
                  <div style={{ textAlign: "center", padding: "60px 0", fontFamily: "'DM Mono', monospace", fontSize: 11, letterSpacing: 2, color: "#333" }}>
                    QUEUE IS EMPTY — COMPOSE A BATCH
                  </div>
                )}
                {(() => {
                  // Sort by date then time
                  const sorted = [...queuedItems].sort((a, b) => {
                    const aStr = (a.scheduledDate || "9999") + (a.scheduled || "00:00");
                    const bStr = (b.scheduledDate || "9999") + (b.scheduled || "00:00");
                    return aStr.localeCompare(bStr);
                  });
                  // Group by date
                  const groups = {};
                  sorted.forEach(item => {
                    const day = item.scheduledDate || "No date";
                    if (!groups[day]) groups[day] = [];
                    groups[day].push(item);
                  });
                  return Object.entries(groups).map(([day, items]) => (
                    <div key={day} style={{ marginBottom: 32 }}>
                      <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: 3, color: "#c9a87c", textTransform: "uppercase", marginBottom: 12, paddingBottom: 8, borderBottom: "1px solid #1a1a1a" }}>
                        {day === "No date" ? "Unscheduled" : new Date(day + "T12:00:00").toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" })}
                        <span style={{ color: "#333", marginLeft: 12 }}>{items.length} post{items.length !== 1 ? "s" : ""}</span>
                      </div>
                      {items.map(item => (
                        <div key={item.id} className="queue-item" onClick={() => setExpandedId(expandedId === item.id ? null : item.id)}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                            <div style={{ flex: 1 }}>
                              <div style={{ fontSize: 14, color: "#c8c4bc", marginBottom: 8, fontStyle: "italic" }}>"{(item.xCopy || item.redditCopy || item.topic || "").slice(0, 80)}{(item.xCopy || item.redditCopy || "").length > 80 ? "..." : ""}"</div>
                              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                                <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: 2, color: "#c9a87c" }}>{item.scheduled}</span>
                                {item.platforms && item.platforms.x && <span className="pill" style={{ background: "#1a1a1a", color: "#888" }}>X</span>}
                                {item.platforms && item.platforms.reddit && <span className="pill" style={{ background: "#1a1a1a", color: "#FF6314" }}>Reddit</span>}
                              </div>
                            </div>
                            <div style={{ display: "flex", gap: 8, marginLeft: 16 }}>
                              <button className="btn-ghost" onClick={e => { e.stopPropagation(); handlePost(item); }}>Post Now</button>
                              <button className="btn-danger" onClick={e => { e.stopPropagation(); handleDelete(item.id); }}>x</button>
                            </div>
                          </div>
                          {expandedId === item.id && (
                            <div style={{ marginTop: 16, borderTop: "1px solid #1a1a1a", paddingTop: 16 }}>
                              {item.xCopy && <div style={{ marginBottom: 10 }}><div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: "#444", marginBottom: 4 }}>X</div><div style={{ fontSize: 13, color: "#998f80", lineHeight: 1.65 }}>{item.xCopy}</div></div>}
                              {item.redditCopy && <div><div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: "#444", marginBottom: 4 }}>REDDIT</div><div style={{ fontSize: 13, color: "#998f80", lineHeight: 1.65, whiteSpace: "pre-wrap" }}>{item.redditCopy}</div></div>}
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  ));
                })()}
              </div>
            )}

            {activeTab === "log" && (
              <div style={{ animation: "fadeIn 0.4s ease" }}>
                <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 18, fontWeight: 300, letterSpacing: 4, color: "#888", textTransform: "uppercase", marginBottom: 24 }}>Post Log</div>
                {postedItems.length === 0 && (
                  <div style={{ textAlign: "center", padding: "60px 0", fontFamily: "'DM Mono', monospace", fontSize: 11, letterSpacing: 2, color: "#333" }}>NO POSTS YET</div>
                )}
                {postedItems.map(item => (
                  <div key={item.id} style={{ borderBottom: "1px solid #151515", padding: "14px 0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div style={{ fontSize: 13, color: "#777", fontStyle: "italic", marginBottom: 4 }}>"{item.xCopy || item.topic}"</div>
                      <div style={{ display: "flex", gap: 8 }}>
                        {item.platforms && item.platforms.x && <span className="pill" style={{ background: "#1a1a1a", color: "#888" }}>X</span>}
                        {item.platforms && item.platforms.reddit && <span className="pill" style={{ background: "#1a1a1a", color: "#FF6314" }}>Reddit</span>}
                      </div>
                    </div>
                    <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: "#333" }}>{item.scheduledDate} {item.scheduled}</span>
                  </div>
                ))}
              </div>
            )}

          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
